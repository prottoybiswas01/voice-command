# X Assistant Configuration File (Phase 4 Upgrade)
assistant:
  name: "X Assistant"
  version: "4.0.0"
  wake_words:
    - "x"
    - "hey x"
    - "x listen"
  language: "bn-EN"
  debug_mode: true

speech:
  stt_engine: "speech_recognition"
  stt_language_primary: "bn-BD"
  stt_language_secondary: "en-US"
  tts_engine: "pyttsx3"
  tts_rate: 175
  tts_volume: 1.0

ollama:
  host: "http://localhost:11434"
  model: "gemma2:2b"
  timeout: 45
  max_context_length: 4096
  system_prompt: >
    You are X Assistant Phase 4, a Smart Home and IoT AI Assistant.
    You manage Arduino hardware, sensors, relays, automation rules, and Windows computer control.

browser:
  preferred_browser: "chrome"
  headless: false
  slow_mo: 500

music:
  priority:
    - "spotify"
    - "youtube"
    - "local"
  local_music_dir: "~/Music"

agent:
  auto_retry_attempts: 2
  pomodoro_focus_minutes: 25
  pomodoro_break_minutes: 5

iot:
  baud_rate: 9600
  auto_detect_com: true
  simulation_mode_if_disconnected: true
  default_room: "Living Room"

paths:
  db_path: "data/x_assistant.db"
  logs_dir: "logs"
  notes_dir: "data/notes"
  screenshots_dir: "data/screenshots"
  recordings_dir: "data/recordings"
  audio_dir: "data/audio"
