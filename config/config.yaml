# X Assistant Configuration File (Phase 3 Upgrade)
assistant:
  name: "X Assistant"
  version: "3.0.0"
  wake_words:
    - "x"
    - "hey x"
    - "x listen"
  language: "bn-EN"
  debug_mode: true

speech:
  stt_engine: "speech_recognition"
  stt_language_primary: "bn-BD"
  stt_language_secondary: "en-US"
  tts_engine: "pyttsx3"
  tts_rate: 175
  tts_volume: 1.0

ollama:
  host: "http://localhost:11434"
  model: "gemma2:2b"
  timeout: 45
  max_context_length: 4096
  system_prompt: >
    You are X Assistant Phase 3, an autonomous AI Agent with full Windows computer control.
    You plan multi-step execution, verify completion, auto-retry on errors, and communicate fluently in Bangla, English, and Banglish.

browser:
  preferred_browser: "chrome"
  headless: false
  slow_mo: 500

music:
  priority:
    - "spotify"
    - "youtube"
    - "local"
  local_music_dir: "~/Music"

agent:
  auto_retry_attempts: 2
  pomodoro_focus_minutes: 25
  pomodoro_break_minutes: 5

paths:
  db_path: "data/x_assistant.db"
  logs_dir: "logs"
  notes_dir: "data/notes"
  screenshots_dir: "data/screenshots"
  recordings_dir: "data/recordings"
  audio_dir: "data/audio"
