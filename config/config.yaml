# X Assistant Configuration File (Phase 2 Upgrade)
assistant:
  name: "X Assistant"
  version: "2.0.0"
  wake_words:
    - "x"
    - "hey x"
    - "x listen"
  language: "bn-EN"
  debug_mode: true

speech:
  stt_engine: "speech_recognition" # speech_recognition, vosk, whisper
  stt_language_primary: "bn-BD"
  stt_language_secondary: "en-US"
  tts_engine: "pyttsx3" # pyttsx3 or piper
  tts_rate: 175
  tts_volume: 1.0

ollama:
  host: "http://localhost:11434"
  model: "gemma2:2b" # gemma2:2b, llama3.2, mistral
  timeout: 45
  max_context_length: 4096
  system_prompt: >
    You are X Assistant Phase 2, a highly intelligent, polite, and context-aware AI personal assistant.
    You communicate fluently in Bangla, English, and mixed Bangla-English (Banglish).
    You possess long-term memory of user preferences and multi-step reasoning capabilities.

browser:
  preferred_browser: "chrome" # chrome, edge, firefox
  headless: false
  slow_mo: 500

music:
  priority:
    - "spotify"
    - "youtube"
    - "local"
  local_music_dir: "~/Music"

paths:
  db_path: "data/x_assistant.db"
  logs_dir: "logs"
  notes_dir: "data/notes"
  screenshots_dir: "data/screenshots"
