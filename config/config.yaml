# Motu AI Assistant Configuration File (Phase 6 Upgrade)
assistant:
  name: "Motu Assistant"
  version: "6.0.0"
  wake_words:
    - "motu"
    - "hey motu"
    - "motu listen"
    - "মটু"
    - "হে মটু"
    - "হেই মটু"
    - "মটু শোনো"
  language: "bn-EN"
  debug_mode: true
  active_personality: "standard"

speech:
  stt_engine: "speech_recognition"
  stt_language_primary: "bn-BD"
  stt_language_secondary: "en-US"
  tts_engine: "pyttsx3"
  tts_rate: 175
  tts_volume: 1.0

ollama:
  host: "http://localhost:11434"
  model: "gemma2:2b"
  timeout: 45
  max_context_length: 4096
  system_prompt: >
    You are Motu AI Assistant Phase 6, the Ultimate Personal AI Ecosystem.
    You manage Voice, Vision, Long-term Memory, Local RAG Knowledge Base, Custom Workflows, Plugins, and IoT Devices.

browser:
  preferred_browser: "chrome"
  headless: false
  slow_mo: 500

music:
  priority:
    - "spotify"
    - "youtube"
    - "local"
  local_music_dir: "~/Music"

agent:
  auto_retry_attempts: 2
  pomodoro_focus_minutes: 25
  pomodoro_break_minutes: 5

iot:
  baud_rate: 9600
  auto_detect_com: true
  simulation_mode_if_disconnected: true
  default_room: "Living Room"

web:
  host: "0.0.0.0"
  port: 8000
  enabled: true

vision:
  camera_index: 0
  camera_fps: 30
  frame_width: 640
  frame_height: 480
  privacy_default_off: true
  tesseract_cmd: "tesseract"

rag:
  knowledge_dir: "data/knowledge"
  chunk_size: 500
  top_k_results: 3

paths:
  db_path: "data/x_assistant.db"
  logs_dir: "logs"
  notes_dir: "data/notes"
  screenshots_dir: "data/screenshots"
  recordings_dir: "data/recordings"
  audio_dir: "data/audio"
  captures_dir: "data/captures"
  knowledge_dir: "data/knowledge"
  plugins_dir: "plugins"
